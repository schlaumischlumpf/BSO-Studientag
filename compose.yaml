version: '3.8'

services:
  app:
    container_name: bso-app
    build:
      context: .
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=test
      - DB_NAME=bso
    networks:
      - bso-network

  web:
    container_name: bso-web
    image: nginx:stable-alpine
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bso-network
      # - proxy_network # Einkommentieren, falls du dieses externe Netzwerk hier auch brauchst

  db:
    container_name: bso-db
    image: mariadb:10.9
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "test"
      MYSQL_DATABASE: bso
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bso-network

  phpmyadmin:
    container_name: bso-phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "test"
      PHP_UPLOAD_MAX_FILESIZE: 16M
    ports:
      - "8082:80"
    networks:
      - bso-network

volumes:
  db-data:

networks:
  bso-network:
    driver: bridge
  # proxy_network:
  #   external: true
