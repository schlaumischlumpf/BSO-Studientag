services:
  proxy:
    image: nginx:alpine
    container_name: bso_proxy
    depends_on:
      - app
    ports:
      - "9000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    networks:
      - bso_net

  app:
    build:
      context: .
    container_name: bso_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: "test"
      DB_NAME: bso
    volumes:
      - .:/var/www/html
    networks:
      - bso_net

  db:
    image: mariadb:10.9
    container_name: bso_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "test"
      MYSQL_DATABASE: bso
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bso_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: bso_phpmyadmin
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "test"
      PHP_UPLOAD_MAX_FILESIZE: 16M
    ports:
      - "8082:80"
    networks:
      - bso_net

volumes:
  db-data:

networks:
  bso_net:
    driver: bridge
